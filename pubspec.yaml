name: safecampus
description: AI-Based Safe Campus Security System
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # UI Components
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.66.2
  google_maps_flutter: ^2.5.3
  cached_network_image: ^3.3.1

  # Icons
  iconsax: ^0.0.8

  # Utils
  intl: ^0.19.0
  gap: ^3.0.1

  # Firebase (optional - for auth)
  # firebase_core: ^2.25.4
  # firebase_auth: ^4.17.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/loginpage.png
    - assets/splash_screen.jpeg
    - assets/

  fonts:
    - family: SF Pro Display
      fonts:
        # - asset: assets/fonts/SF-Pro-Display-Regular.otf
        #   weight: 400

        # - asset: assets/fonts/SF-Pro-Display-Medium.otf
        #   weight: 500

        # - asset: assets/fonts/SF-Pro-Display-Semibold.otf
        #   weight: 600

        # - asset: assets/fonts/SF-Pro-Display-Bold.otf
        #   weight: 700